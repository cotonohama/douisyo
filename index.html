<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>同意書管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
padding:20px;
max-width:900px;
margin:auto;
}

h1{text-align:center;}

input,textarea,button{
width:100%;
padding:8px;
margin:5px 0 15px 0;
font-size:16px;
}

button{
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.card{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

.red{color:red;font-weight:bold;}
.expired{background:#ffd6d6;}
.gray{background:#eee;}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:6px;
font-size:14px;
}

.checkbox-row{
display:flex;
gap:20px;
margin-bottom:15px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
}

.day{
background:#fff;
border:1px solid #ddd;
min-height:70px;
padding:5px;
font-size:12px;
}

.day strong{
display:block;
}

</style>

</head>

<body>

<h1>同意書管理</h1>

<div class="card">

<h3>患者検索</h3>
<input id="search" placeholder="名前検索" oninput="render()">

</div>

<div class="card">

<h3>患者登録 / 編集</h3>

<input type="hidden" id="editIndex">

患者名
<input id="name">

同意日
<input type="date" id="consent">

初療日
<input type="date" id="first">

<div class="checkbox-row">

<label>
<input type="checkbox" id="renewal"> 再同意
</label>

<label>
<input type="checkbox" id="deform"> 変形徒手
</label>

</div>

通知日数
<input type="number" id="notice" value="30">

メモ
<textarea id="memo"></textarea>

<button onclick="save()">保存</button>

</div>

<div class="card">

<h3>患者一覧</h3>

<table id="list">
<thead>
<tr>
<th>名前</th>
<th>期限</th>
<th>残日数</th>
<th>操作</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<div class="card">

<h3>更新カレンダー</h3>

<div id="calendar" class="calendar"></div>

</div>

<div class="card">

<button onclick="exportCSV()">CSVバックアップ</button>
<input type="file" onchange="importCSV(event)">

</div>

<script>

let patients = JSON.parse(localStorage.getItem("patients")||"[]")

let today=new Date()

const consent=document.getElementById("consent")
const first=document.getElementById("first")
const deform=document.getElementById("deform")
const notice=document.getElementById("notice")

consent.addEventListener("change",()=>{
first.min=consent.value
})

deform.addEventListener("change",()=>{
notice.value=deform.checked?15:30
})

document.getElementById("renewal").addEventListener("change",()=>{
if(document.getElementById("renewal").checked){
first.disabled=true
first.classList.add("gray")
}else{
first.disabled=false
first.classList.remove("gray")
}
})

function endOfMonth(d){
return new Date(d.getFullYear(),d.getMonth()+1,0)
}

function addMonths(date,m){
let d=new Date(date)
d.setMonth(d.getMonth()+m)
return d
}

function calculateExpiry(consent,first,renewal,deform){

let consentDate=new Date(consent)
let firstDate=first?new Date(first):null

let base

if(renewal){
base=consentDate
}else{

if(firstDate){

let diff=(firstDate-consentDate)/(1000*60*60*24)

base=diff>30?consentDate:firstDate

}else{
base=consentDate
}

}

let expiry

if(deform){

expiry=new Date(base)
expiry.setMonth(expiry.getMonth()+1)
expiry.setDate(expiry.getDate()-1)

}else{

let day=base.getDate()

expiry=day<=15
?endOfMonth(addMonths(base,5))
:endOfMonth(addMonths(base,6))

}

return expiry

}

function save(){

let idx=document.getElementById("editIndex").value

let name=document.getElementById("name").value
let consent=document.getElementById("consent").value
let first=document.getElementById("first").value
let renewal=document.getElementById("renewal").checked
let deform=document.getElementById("deform").checked
let notice=document.getElementById("notice").value
let memo=document.getElementById("memo").value

if(!name||!consent){
alert("名前と同意日は必須です")
return
}

let expiry=calculateExpiry(consent,first,renewal,deform)

let data={
id: idx===""?Date.now():patients[idx].id,
name,
consent,
first,
renewal,
deform,
notice,
memo,
expiry
}

if(idx===""){
patients.push(data)
}else{
patients[idx]=data
}

localStorage.setItem("patients",JSON.stringify(patients))

location.reload()

}

function render(){

let tbody=document.querySelector("#list tbody")
tbody.innerHTML=""

let keyword=document.getElementById("search").value

let list=patients.map((p,i)=>({...p,index:i}))

list.sort((a,b)=>new Date(a.expiry)-new Date(b.expiry))

list.forEach(p=>{

if(keyword&&!p.name.includes(keyword))return

let exp=new Date(p.expiry)
let diff=Math.ceil((exp-today)/(1000*60*60*24))

let tr=document.createElement("tr")

if(diff<0)tr.classList.add("expired")

let red=diff<=p.notice?"red":""

tr.innerHTML=`
<td>${p.name}</td>
<td>${exp.toLocaleDateString()}</td>
<td class="${red}">${diff}</td>
<td>
<button onclick="edit(${p.index})">編集</button>
<button onclick="del(${p.index})">削除</button>
<button onclick="addCalendar('${p.name}','${exp.toISOString().split("T")[0]}')">📅</button>
</td>
`

tbody.appendChild(tr)

})

renderCalendar()

}

function edit(i){

let p=patients[i]

document.getElementById("editIndex").value=i
document.getElementById("name").value=p.name
document.getElementById("consent").value=p.consent
document.getElementById("first").value=p.first
document.getElementById("renewal").checked=p.renewal
document.getElementById("deform").checked=p.deform
document.getElementById("notice").value=p.notice
document.getElementById("memo").value=p.memo

window.scrollTo(0,0)

}

function del(i){

if(confirm("削除しますか？")){

patients.splice(i,1)

localStorage.setItem("patients",JSON.stringify(patients))

render()

}

}

function addCalendar(name,date){

let url=`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${name} 同意書更新&dates=${date.replace(/-/g,"")}T090000/${date.replace(/-/g,"")}T100000`

window.open(url)

}

function renderCalendar(){

let cal=document.getElementById("calendar")
cal.innerHTML=""

let now=new Date()
let year=now.getFullYear()
let month=now.getMonth()

let last=new Date(year,month+1,0).getDate()

for(let i=1;i<=last;i++){

let day=document.createElement("div")
day.className="day"

day.innerHTML=`<strong>${i}</strong>`

patients.forEach(p=>{

let exp=new Date(p.expiry)

if(exp.getDate()==i && exp.getMonth()==month){

let div=document.createElement("div")
div.textContent=p.name

day.appendChild(div)

}

})

cal.appendChild(day)

}

}

function exportCSV(){

let csv="name,consent,first,renewal,deform,notice,memo\n"

patients.forEach(p=>{
csv+=`${p.name},${p.consent},${p.first},${p.renewal},${p.deform},${p.notice},${p.memo}\n`
})

let blob=new Blob([csv])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="backup.csv"
a.click()

}

function importCSV(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

let rows=reader.result.split("\n")

patients=[]

rows.slice(1).forEach(r=>{

let c=r.split(",")

if(c[0]){

let expiry=calculateExpiry(c[1],c[2],c[3]=="true",c[4]=="true")

patients.push({

id:Date.now()+Math.random(),
name:c[0],
consent:c[1],
first:c[2],
renewal:c[3]=="true",
deform:c[4]=="true",
notice:c[5],
memo:c[6],
expiry

})

}

})

localStorage.setItem("patients",JSON.stringify(patients))

location.reload()

}

reader.readAsText(file)

}

render()

</script>

<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
