<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>同意書管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:sans-serif;
max-width:720px;
margin:auto;
padding:20px;
background:#f5f5f5;
}

h1{
text-align:center;
}

.formBox{
background:#fff;
padding:15px;
border-radius:10px;
border:1px solid #ddd;
}

.editMode{
background:#e3f2fd;
border:2px solid #2196F3;
}

.notice{
display:none;
background:#ffebee;
padding:12px;
margin-bottom:10px;
border-radius:8px;
font-weight:bold;
color:#c62828;
}

label{
display:block;
margin-top:10px;
font-weight:bold;
font-size:0.9em;
}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
box-sizing:border-box;
}

textarea{
min-height:60px;
}

.checkbox-group{
display:flex;
gap:15px;
margin-top:10px;
}

.checkbox{
display:flex;
align-items:center;
gap:5px;
}

button{
padding:10px;
margin-top:10px;
background:#4CAF50;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;
}

.card{
border:1px solid #ddd;
padding:15px;
margin-top:10px;
border-radius:10px;
}

.green{background:#e8f5e9;border-left:8px solid #4caf50;}
.yellow{background:#fff9c4;border-left:8px solid #fbc02d;}
.red{background:#ffcdd2;border-left:8px solid #f44336;}

.small{
font-size:0.85em;
color:#555;
margin-top:5px;
border-top:1px dotted #ccc;
padding-top:5px;
}

.filterButtons{
display:flex;
gap:10px;
margin:15px 0;
}

.btn-edit{background:#2196F3;width:auto;padding:5px 15px;}
.btn-delete{background:#f44336;width:auto;padding:5px 15px;margin-left:5px;}
.btn-cal{background:#ff9800;width:auto;padding:5px 15px;margin-left:5px;}

.schedule{
background:#fff;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-top:10px;
}

</style>
</head>

<body>

<h1>同意書管理</h1>

<div class="notice" id="editNotice"></div>

<div class="formBox" id="formBox">

<h3 id="formTitle">患者登録</h3>

<label>患者名</label>
<input type="text" id="name">

<label>同意日</label>
<input type="date" id="consent">

<label>初療日（空欄可）</label>
<input type="date" id="first">

<div class="checkbox-group">

<div class="checkbox">
<input type="checkbox" id="renewal">
<label for="renewal">再同意</label>
</div>

<div class="checkbox">
<input type="checkbox" id="deform">
<label for="deform">変形徒手</label>
</div>

</div>

<label>通知日数</label>
<input type="number" id="alertDays" value="14">

<label>次回更新予定日</label>
<input type="date" id="planDate">

<label>メモ</label>
<textarea id="memo"></textarea>

<button id="saveBtn" onclick="savePatient()">保存する</button>

</div>

<h3>検索</h3>

<input type="text" id="search" placeholder="患者名で検索" oninput="render()">

<div class="filterButtons">

<button onclick="showAll()">全患者</button>
<button onclick="showThisMonth()">今月更新</button>
<button onclick="showNextMonth()">翌月更新</button>

</div>

<button onclick="addMonthToCalendar()">📅 今月更新をカレンダー登録</button>

<h3>更新スケジュール</h3>

<div id="schedule" class="schedule"></div>

<h3>患者一覧</h3>

<div id="list"></div>

<script>

let patients = JSON.parse(localStorage.getItem("patients") || "[]")

let editIndex=-1
let filterMode="all"

const todayStr=new Date().toISOString().split("T")[0]

document.getElementById("consent").setAttribute("max",todayStr)

function endOfMonth(date){
return new Date(date.getFullYear(),date.getMonth()+1,0)
}

function addMonths(date,m){
let d=new Date(date)
d.setMonth(d.getMonth()+m)
return d
}

function calculateExpiry(consent,first,renewal,deform){

let consentDate=new Date(consent)
let firstDate=first?new Date(first):null
let base

if(renewal){
base=consentDate
}else{

if(firstDate){

let diff=(firstDate-consentDate)/(1000*60*60*24)

base=(diff>30)?consentDate:firstDate

}else{
base=consentDate
}

}

let expiry

if(deform){

expiry=new Date(base)
expiry.setMonth(expiry.getMonth()+1)
expiry.setDate(expiry.getDate()-1)

}else{

let day=base.getDate()

if(day<=15){
expiry=endOfMonth(addMonths(base,5))
}else{
expiry=endOfMonth(addMonths(base,6))
}

}

return expiry

}

function daysLeft(date){

let today=new Date()
today.setHours(0,0,0,0)

return Math.floor((date-today)/(1000*60*60*24))

}

function getColor(days,alertDays){

if(days<=alertDays)return"red"
if(days<=60)return"yellow"

return"green"

}

function savePatient(){

let name=document.getElementById("name").value
let consent=document.getElementById("consent").value
let first=document.getElementById("first").value
let renewal=document.getElementById("renewal").checked
let deform=document.getElementById("deform").checked
let alertDays=parseInt(document.getElementById("alertDays").value)||14
let memo=document.getElementById("memo").value
let planDate=document.getElementById("planDate").value

if(!name||!consent){
alert("患者名と同意日を入力してください")
return
}

let data={name,consent,first,renewal,deform,alertDays,memo,planDate}

if(editIndex>=0){
patients[editIndex]=data
}else{
patients.push(data)
}

localStorage.setItem("patients",JSON.stringify(patients))

clearForm()
render()

}

function clearForm(){

document.getElementById("name").value=""
document.getElementById("consent").value=""
document.getElementById("first").value=""
document.getElementById("renewal").checked=false
document.getElementById("deform").checked=false
document.getElementById("alertDays").value=14
document.getElementById("memo").value=""
document.getElementById("planDate").value=""

document.getElementById("editNotice").style.display="none"
document.getElementById("formBox").classList.remove("editMode")

editIndex=-1

}

function render(){

let list=document.getElementById("list")
list.innerHTML=""

let keyword=document.getElementById("search").value.toLowerCase()

let filtered=patients.filter(p=>{

if(keyword && !p.name.toLowerCase().includes(keyword))return false

if(filterMode==="month"){

let expiry=calculateExpiry(p.consent,p.first,p.renewal,p.deform)
let now=new Date()

return expiry.getMonth()===now.getMonth()

}

if(filterMode==="next"){

let expiry=calculateExpiry(p.consent,p.first,p.renewal,p.deform)
let now=new Date()

return expiry.getMonth()===(now.getMonth()+1)%12

}

return true

})

filtered.sort((a,b)=>calculateExpiry(a.consent,a.first,a.renewal,a.deform)-calculateExpiry(b.consent,b.first,b.renewal,b.deform))

filtered.forEach(p=>{

let realIndex=patients.indexOf(p)

let expiry=calculateExpiry(p.consent,p.first,p.renewal,p.deform)

let days=daysLeft(expiry)

let color=getColor(days,p.alertDays)

let card=document.createElement("div")

card.className="card "+color

card.innerHTML=`

<b>${p.name}</b><br>

同意期限 ${expiry.toLocaleDateString("ja-JP")}<br>

残り ${days}日

${p.memo?`<div class="small">${p.memo}</div>`:""}

<div style="margin-top:10px">

<button class="btn-edit" onclick="editPatient(${realIndex})">編集</button>

<button class="btn-delete" onclick="deletePatient(${realIndex})">削除</button>

<button class="btn-cal" onclick="addToCalendar(${realIndex})">📅</button>

</div>

`

list.appendChild(card)

})

renderSchedule()

}

function renderSchedule(){

let schedule=document.getElementById("schedule")

schedule.innerHTML=""

let list=[...patients]

list.sort((a,b)=>calculateExpiry(a.consent,a.first,a.renewal,a.deform)-calculateExpiry(b.consent,b.first,b.renewal,b.deform))

list.forEach(p=>{

let expiry=calculateExpiry(p.consent,p.first,p.renewal,p.deform)

let item=document.createElement("div")

item.innerHTML=`${expiry.toLocaleDateString("ja-JP",{month:"numeric",day:"numeric"})}　${p.name}`

schedule.appendChild(item)

})

}

function addToCalendar(i){

let p=patients[i]

let expiry=calculateExpiry(p.consent,p.first,p.renewal,p.deform)

let date=expiry.toISOString().split("T")[0].replace(/-/g,"")

let url="https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent("同意書更新："+p.name)+"&dates="+date+"/"+date

window.open(url)

}

function addMonthToCalendar(){

let now=new Date()

patients.forEach((p,i)=>{

let expiry=calculateExpiry(p.consent,p.first,p.renewal,p.deform)

if(expiry.getMonth()===now.getMonth()){

setTimeout(()=>addToCalendar(i),i*800)

}

})

}

function showAll(){filterMode="all";render()}
function showThisMonth(){filterMode="month";render()}
function showNextMonth(){filterMode="next";render()}

function editPatient(i){

let p=patients[i]

document.getElementById("name").value=p.name
document.getElementById("consent").value=p.consent
document.getElementById("first").value=p.first
document.getElementById("renewal").checked=p.renewal
document.getElementById("deform").checked=p.deform
document.getElementById("alertDays").value=p.alertDays
document.getElementById("memo").value=p.memo
document.getElementById("planDate").value=p.planDate

document.getElementById("editNotice").innerText="編集中："+p.name
document.getElementById("editNotice").style.display="block"

document.getElementById("formBox").classList.add("editMode")

window.scrollTo({top:0,behavior:"smooth"})

editIndex=i

}

function deletePatient(i){

if(!confirm("削除しますか？"))return

patients.splice(i,1)

localStorage.setItem("patients",JSON.stringify(patients))

render()

}

render()

</script>
</body>
</html>
