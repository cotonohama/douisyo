<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>同意書管理システム</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#4CAF50">

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
padding:10px;
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
color:#333;
margin-bottom:5px;
font-size:24px;
}

.version{
text-align:center;
font-size:11px;
color:#888;
margin-bottom:15px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,textarea,select,button{
width:100%;
padding:12px;
margin:5px 0 10px 0;
font-size:16px;
box-sizing:border-box;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
font-weight:bold;
}

.btn-sync{background:#06C755;}
.btn-json{background:#673ab7;}
.btn-restore{background:#ff9800;}
.btn-csv{background:#607d8b;}

.btn-del{background:#f44336;width:auto;padding:5px 10px;}
.btn-edit{background:#2196f3;width:auto;padding:5px 10px;}
.btn-google{background:#fb8c00;width:auto;padding:5px 10px;}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
font-size:14px;
}

th{
background:#eee;
}

.expired{
background:#ffd6d6;
}

.status-bar{
height:4px;
width:100%;
margin-top:4px;
border-radius:2px;
}

.bg-red{background:red;}
.bg-orange{background:#ff8800;}
.bg-yellow{background:#caa400;}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:3px;
}

.day{
border:1px solid #ddd;
min-height:70px;
padding:3px;
font-size:10px;
background:white;
}

.day b{font-size:13px;}

.flex-group{
display:flex;
gap:10px;
flex-wrap:wrap;
}

</style>
</head>

<body>

<h1>同意書管理システム</h1>
<div class="version">Master v4</div>

<details class="card" style="background:#e8f5e9;">
<summary style="font-weight:bold;">同期・バックアップ</summary>

<button onclick="generateSyncURL()" class="btn-sync">
同期URL発行
</button>

<button onclick="showQR()" class="btn-sync">
QRコード表示
</button>

<button onclick="startQRScan()" class="btn-sync">
QR読み取り同期
</button>

<div id="qrBox" style="text-align:center;"></div>

<div id="qr-reader" style="width:300px;margin:auto;"></div>

<div class="flex-group">

<button onclick="shareJSON()" class="btn-json">
JSON共有
</button>

<button onclick="downloadJSON()" class="btn-json">
JSON保存
</button>

<button onclick="document.getElementById('importFile').click()" class="btn-json">
JSON読込
</button>

</div>

<input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">

<button onclick="restoreAutoBackup()" class="btn-restore">
自動バックアップ復元
</button>

<button onclick="backupCSV()" class="btn-csv">
CSV出力
</button>

</details>

<div class="card">

<div style="display:flex;gap:20px;flex-wrap:wrap;">

<div>
<strong>今月更新</strong>
<div id="thisMonthSummary"></div>
</div>

<div>
<strong>来月更新</strong>
<div id="nextMonthSummary"></div>
</div>

</div>

</div>

<div class="card">

<input id="search" placeholder="検索">

<div class="flex-group">

<select id="sort">
<option value="expiry">期限順</option>
<option value="name">名前順</option>
</select>

<select id="filter">
<option value="all">すべて</option>
<option value="this">今月</option>
<option value="next">来月</option>
</select>

</div>

</div>

<div class="card" id="formSection">

<input type="hidden" id="editIndex">

<label>患者名</label>
<input id="name">

<label>同意日</label>
<input type="date" id="consent">

<label>初療日</label>
<input type="date" id="first">

<label>
<input type="checkbox" id="deform" style="width:auto;">
変形徒手矯正
</label>

<label>通知日数</label>
<input type="number" id="notice" value="7">

<label>メモ</label>
<textarea id="memo"></textarea>

<button onclick="save()">保存</button>

</div>

<div class="card">

<h3>患者一覧</h3>

<table>

<thead>
<tr>
<th>名前</th>
<th>期限</th>
<th>残日数</th>
<th>操作</th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>

</div>

<div class="card">

<h3>更新カレンダー</h3>

<h4 id="labelThis"></h4>
<div id="calendarThis" class="calendar-grid"></div>

<h4 id="labelNext"></h4>
<div id="calendarNext" class="calendar-grid"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let patients=JSON.parse(localStorage.getItem("patients")||"[]");
let notifiedToday=[];

window.onload=function(){

if("Notification" in window){
Notification.requestPermission();
}

render();

}

function showQR(){

const json=JSON.stringify(patients);
const encoded=btoa(unescape(encodeURIComponent(json)));

const url=location.origin+location.pathname+"?data="+encoded;

document.getElementById("qrBox").innerHTML="";

QRCode.toCanvas(url,{width:220},function(err,canvas){
document.getElementById("qrBox").appendChild(canvas);
});

}

function startQRScan(){

const scanner=new Html5Qrcode("qr-reader");

scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:250},

qrMessage=>{

scanner.stop();

try{

const url=new URL(qrMessage);
const data=url.searchParams.get("data");

const decoded=JSON.parse(
decodeURIComponent(
escape(atob(data))
)
);

patients=decoded;

localStorage.setItem(
"patients",
JSON.stringify(patients)
);

render();

alert("同期完了");

}catch{

alert("QRエラー");

}

},

error=>{}

);

}

function save(){

let name=document.getElementById("name").value;
let consent=document.getElementById("consent").value;

if(!name||!consent){
alert("入力してください");
return;
}

let idx=document.getElementById("editIndex").value;

let data={
id:idx?patients[idx].id:Date.now(),
name:name,
consent:consent,
first:document.getElementById("first").value,
deform:document.getElementById("deform").checked,
notice:Number(document.getElementById("notice").value||7),
memo:document.getElementById("memo").value,
expiry:new Date(consent)
};

if(idx===""){
patients.push(data);
}else{
patients[idx]=data;
}

localStorage.setItem(
"patients",
JSON.stringify(patients)
);

render();

}

function render(){

let tbody=document.getElementById("list");

tbody.innerHTML="";

patients.forEach((p,i)=>{

let tr=document.createElement("tr");

tr.innerHTML=`
<td>
<b>${p.name}</b>
${p.deform?'<br><small>変形徒手</small>':''}
</td>

<td>${new Date(p.expiry).toLocaleDateString()}</td>

<td>-</td>

<td>

<button onclick="edit(${i})" class="btn-edit">
編
</button>

<button onclick="del(${i})" class="btn-del">
消
</button>

</td>
`;

tbody.appendChild(tr);

});

}

function edit(i){

let p=patients[i];

document.getElementById("editIndex").value=i;
document.getElementById("name").value=p.name;
document.getElementById("consent").value=p.consent;
document.getElementById("first").value=p.first||"";
document.getElementById("deform").checked=p.deform;
document.getElementById("notice").value=p.notice;
document.getElementById("memo").value=p.memo;

}

function del(i){

if(confirm("削除しますか？")){

patients.splice(i,1);

localStorage.setItem(
"patients",
JSON.stringify(patients)
);

render();

}

}

</script>

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js");

}

</script>

</body>
</html>
