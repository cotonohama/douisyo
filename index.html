<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>同意書期限管理システム</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --main-color: #2c3e50; --accent-color: #3498db; --success-color: #27ae60; --bg-color: #f4f7f6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-color); color: #333; margin: 0; padding: 10px; line-height: 1.5; }
        .container { max-width: 800px; margin: auto; }
        h1 { text-align: center; color: var(--main-color); font-size: 1.5rem; margin-bottom: 5px; }
        .sub-text { text-align: center; font-size: 0.8rem; color: #7f8c8d; margin-bottom: 20px; }

        /* カードデザイン */
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e0e6e8; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 4px; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        
        /* ボタン群 */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        button { border: none; border-radius: 8px; padding: 14px; font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: opacity 0.2s; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:active { opacity: 0.7; transform: translateY(1px); }
        
        .btn-primary { background: var(--accent-color); width: 100%; font-size: 1.1rem; }
        .btn-share { background: #06C755; } /* LINE風カラー */
        .btn-copy { background: #5d6d7e; }
        .btn-backup { background: #f39c12; }
        .btn-outline { background: white; color: var(--main-color); border: 1px solid #ddd; padding: 8px; font-size: 0.8rem; }

        /* リストとステータス */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 0.75rem; color: #7f8c8d; padding: 8px; border-bottom: 2px solid #eee; }
        td { padding: 12px 8px; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
        .patient-name { font-weight: bold; font-size: 1rem; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-top: 4px; }
        .bg-urgent { background: #ffeded; color: #e74c3c; border: 1px solid #ffcaca; }
        .bg-soon { background: #fff9eb; color: #d35400; border: 1px solid #ffeaa7; }
        
        /* カレンダー・サマリー */
        .summary-flex { display: flex; gap: 10px; margin-bottom: 16px; }
        .summary-item { flex: 1; background: #ebf5fb; padding: 10px; border-radius: 8px; font-size: 0.8rem; border: 1px solid #d6eaf8; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #eee; border: 1px solid #ddd; margin-top: 10px; }
        .cal-day { background: white; min-height: 60px; padding: 4px; font-size: 0.7rem; }
        .cal-header { background: #f8f9f9; text-align: center; font-weight: bold; padding: 5px; font-size: 0.7rem; }

        /* 同期パネル */
        #syncStatusPanel { display: none; background: #e8f8f5; border: 2px solid #27ae60; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        #syncUrlBox { width: 100%; height: 60px; font-size: 0.7rem; margin-top: 10px; background: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>同意書期限管理</h1>
    <p class="sub-text">医療マッサージ・訪問看護・リハビリ対応</p>

    <div id="syncStatusPanel">
        <strong style="color:var(--success-color);">✓ 準備完了</strong><br>
        <span style="font-size:0.85rem;">リンクをLINE等に貼り付けて送信してください。</span>
        <textarea id="syncUrlBox" readonly></textarea>
        <button onclick="document.getElementById('syncStatusPanel').style.display='none'" class="btn-outline" style="margin: 10px auto 0;">閉じる</button>
    </div>

    <details class="card">
        <summary style="cursor:pointer; font-weight:bold; color:var(--main-color);">🔄 データ同期・共有 (PC↔スマホ)</summary>
        <div style="margin-top:15px;">
            <div class="btn-grid">
                <button onclick="shareViaWeb()" class="btn-share">📱 スマホへ送る<br>(LINE/メール等)</button>
                <button onclick="copySyncLink()" class="btn-copy">🔗 同期URLを<br>コピーする</button>
            </div>
            <p style="font-size:0.75rem; color:#666; margin-bottom:15px;">※URLをクリックするだけで他端末にデータが反映されます。ファイル保存は不要です。</p>
            <div class="btn-grid">
                <button onclick="downloadJSON()" class="btn-backup" style="font-size:0.8rem;">💾 ファイル保存</button>
                <button onclick="document.getElementById('fileInput').click()" class="btn-backup" style="font-size:0.8rem;">📥 ファイル読込</button>
            </div>
            <input type="file" id="fileInput" style="display:none" onchange="importFromFile(event)">
            <button onclick="restoreLastBackup()" class="btn-outline" style="width:100%; margin-top:10px;">↩️ 1つ前の保存状態に戻す</button>
        </div>
    </details>

    <div class="summary-flex">
        <div class="summary-item"><strong>今月更新</strong><div id="sumThis"></div></div>
        <div class="summary-item"><strong>来月更新</strong><div id="sumNext"></div></div>
    </div>

    <div class="card" id="inputArea">
        <h3 id="formTitle" style="margin:0 0 15px 0; font-size:1.1rem;">患者情報の登録</h3>
        <input type="hidden" id="editIdx" value="">
        
        <label>氏名</label>
        <input id="name" placeholder="例：山田 太郎" required>
        
        <div class="btn-grid" style="grid-template-columns: 1fr 1fr;">
            <div><label>同意日</label><input type="date" id="consentDate"></div>
            <div><label>初療日 (任意)</label><input type="date" id="firstDate"></div>
        </div>

        <label style="display:flex; align-items:center; gap:8px; margin-bottom:15px; cursor:pointer;">
            <input type="checkbox" id="isDeform" style="width:auto; margin:0;">
            <span>変形徒手矯正 (1ヶ月更新)</span>
        </label>

        <label>メモ (主治医名、留意事項など)</label>
        <input id="memo" placeholder="例：〇〇クリニック 往診日：火曜">

        <button onclick="savePatient()" class="btn-primary" id="saveBtn">この内容で保存する</button>
        <button onclick="clearForm()" id="cancelBtn" class="btn-outline" style="display:none; width:100%; margin-top:10px;">入力をキャンセル</button>
    </div>

    <div class="card">
        <input id="searchBox" placeholder="名前やメモで検索..." oninput="renderAll()">
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>患者名</th><th>期限</th><th>操作</th></tr></thead>
                <tbody id="patientList"></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <div id="calContainer"></div>
    </div>
</div>

<script>
let patients = JSON.parse(localStorage.getItem("med_consent_db") || "[]");

// --- 起動時の同期チェック ---
window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const syncData = urlParams.get('data');
    if (syncData) {
        try {
            const decoded = JSON.parse(decodeURIComponent(escape(atob(syncData))));
            if (confirm(`${decoded.length}件のデータを受信しました。現在のデータに上書きして同期しますか？`)) {
                saveToStorage(decoded);
                window.location.href = window.location.pathname; // パラメータ消去
            }
        } catch (e) { alert("同期エラー: データが正しく読み取れませんでした。"); }
    }
    renderAll();
};

// --- 同意期限の計算ルール (遵守) ---
function calculateExpiry(consent, first, isDeform, isEdit) {
    let base = (isEdit || !first) ? new Date(consent) : new Date(first);
    if (isDeform) {
        let d = new Date(base); d.setMonth(d.getMonth() + 1); d.setDate(d.getDate() - 1);
        return d;
    } else {
        // 15日/16日ルール
        return (base.getDate() <= 15) 
            ? new Date(base.getFullYear(), base.getMonth() + 6, 0) 
            : new Date(base.getFullYear(), base.getMonth() + 7, 0);
    }
}

// --- 保存・同期処理 ---
function saveToStorage(data) {
    // 3世代バックアップ
    const cur = localStorage.getItem("med_consent_db");
    if (cur) {
        localStorage.setItem("med_bak2", localStorage.getItem("med_bak1") || "");
        localStorage.setItem("med_bak1", cur);
    }
    patients = data;
    localStorage.setItem("med_consent_db", JSON.stringify(patients));
    renderAll();
}

function savePatient() {
    const name = document.getElementById("name").value;
    const consent = document.getElementById("consentDate").value;
    if (!name || !consent) { alert("「氏名」と「同意日」は必須です"); return; }

    const idx = document.getElementById("editIdx").value;
    const isEdit = idx !== "";
    const first = document.getElementById("firstDate").value;
    const isDeform = document.getElementById("isDeform").checked;
    const expiry = calculateExpiry(consent, first, isDeform, isEdit);

    const newData = {
        id: isEdit ? patients[idx].id : Date.now(),
        name, consent, first, isDeform,
        memo: document.getElementById("memo").value,
        expiry: expiry.toISOString()
    };

    if (isEdit) patients[idx] = newData; else patients.push(newData);
    saveToStorage(patients);
    clearForm();
    alert("保存しました");
}

// --- 共有・同期リンク作成 ---
function getSyncLink() {
    if (patients.length === 0) return null;
    const base64 = btoa(unescape(encodeURIComponent(JSON.stringify(patients))));
    return window.location.origin + window.location.pathname + "?data=" + base64;
}

async function shareViaWeb() {
    const link = getSyncLink();
    if (!link) { alert("データが空です"); return; }
    if (navigator.share) {
        try {
            await navigator.share({ title: '同意書データ同期', text: '最新の患者データをお送りします。リンクをタップして取り込んでください。', url: link });
        } catch (e) { copySyncLink(); }
    } else { copySyncLink(); }
}

function copySyncLink() {
    const link = getSyncLink();
    if (!link) return;
    navigator.clipboard.writeText(link).then(() => {
        document.getElementById("syncStatusPanel").style.display = "block";
        document.getElementById("syncUrlBox").value = link;
    });
}

// --- 描画ロジック ---
function renderAll() {
    const list = document.getElementById("patientList");
    const search = document.getElementById("searchBox").value.toLowerCase();
    list.innerHTML = "";
    
    const now = new Date(); now.setHours(0,0,0,0);
    const thisMonth = now.getMonth();
    const thisYear = now.getFullYear();

    // サマリークリア
    document.getElementById("sumThis").innerText = "";
    document.getElementById("sumNext").innerText = "";

    patients.sort((a,b) => new Date(a.expiry) - new Date(b.expiry)).forEach((p, idx) => {
        if (!p.name.includes(search) && !p.memo.includes(search)) return;

        const exp = new Date(p.expiry);
        const diff = Math.ceil((exp - now) / (1000*60*60*24));
        const tr = document.createElement("tr");

        // アラート判定
        let badge = "";
        if (diff <= 14) badge = `<span class="status-badge bg-urgent">あと${diff}日</span>`;
        else if (diff <= 31) badge = `<span class="status-badge bg-soon">今月期限</span>`;

        tr.innerHTML = `
            <td>
                <span class="patient-name">${p.name}</span><br>
                ${badge} <small style="color:#888">${p.isDeform ? '(変形)' : ''}</small>
            </td>
            <td style="font-size:0.8rem;">${exp.toLocaleDateString()}</td>
            <td>
                <button onclick="editPatient(${idx})" class="btn-outline">編集</button>
            </td>
        `;
        list.appendChild(tr);

        // サマリー振り分け
        if (exp.getFullYear() === thisYear && exp.getMonth() === thisMonth) {
            document.getElementById("sumThis").innerText += ` ${p.name},`;
        } else if (exp.getMonth() === (thisMonth + 1) % 12) {
            document.getElementById("sumNext").innerText += ` ${p.name},`;
        }
    });
    
    // カレンダー描画（2ヶ月分）
    drawCalendar(thisYear, thisMonth);
}

function drawCalendar(y, m) {
    const container = document.getElementById("calContainer");
    container.innerHTML = "";
    
    for (let j = 0; j < 2; j++) {
        const targetM = (m + j) % 12;
        const targetY = y + Math.floor((m + j) / 12);
        
        const header = document.createElement("div");
        header.style = "font-weight:bold; margin:10px 0; border-left:4px solid var(--accent-color); padding-left:8px;";
        header.innerText = `${targetY}年 ${targetM + 1}月`;
        container.appendChild(header);

        const grid = document.createElement("div");
        grid.className = "calendar-grid";
        ["日","月","火","水","木","金","土"].forEach(d => {
            const h = document.createElement("div"); h.className = "cal-header"; h.innerText = d; grid.appendChild(h);
        });

        const firstDay = new Date(targetY, targetM, 1).getDay();
        const lastDate = new Date(targetY, targetM + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement("div")).className = "cal-day";
        for (let i = 1; i <= lastDate; i++) {
            const dayDiv = document.createElement("div");
            dayDiv.className = "cal-day";
            dayDiv.innerHTML = `<b>${i}</b>`;
            patients.forEach(p => {
                const ed = new Date(p.expiry);
                if (ed.getFullYear() === targetY && ed.getMonth() === targetM && ed.getDate() === i) {
                    dayDiv.innerHTML += `<div style="background:#e74c3c; color:white; font-size:0.6rem; padding:1px; margin-top:2px; border-radius:2px;">${p.name.substring(0,3)}</div>`;
                }
            });
            grid.appendChild(dayDiv);
        }
        container.appendChild(grid);
    }
}

function editPatient(idx) {
    const p = patients[idx];
    document.getElementById("editIdx").value = idx;
    document.getElementById("name").value = p.name;
    document.getElementById("consentDate").value = p.consent;
    document.getElementById("firstDate").value = p.first || "";
    document.getElementById("isDeform").checked = p.isDeform;
    document.getElementById("memo").value = p.memo;
    document.getElementById("formTitle").innerText = "情報の編集";
    document.getElementById("saveBtn").innerText = "変更を保存する";
    document.getElementById("cancelBtn").style.display = "block";
    document.getElementById("inputArea").scrollIntoView({behavior:"smooth"});
}

function clearForm() {
    document.getElementById("editIdx").value = "";
    document.getElementById("name").value = "";
    document.getElementById("consentDate").value = "";
    document.getElementById("firstDate").value = "";
    document.getElementById("isDeform").checked = false;
    document.getElementById("memo").value = "";
    document.getElementById("formTitle").innerText = "患者情報の登録";
    document.getElementById("saveBtn").innerText = "この内容で保存する";
    document.getElementById("cancelBtn").style.display = "none";
}

// --- インポート・エクスポート ---
function downloadJSON() {
    const blob = new Blob([JSON.stringify(patients, null, 2)], {type: 'application/json'});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `med_data_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
}

function importFromFile(e) {
    const reader = new FileReader();
    reader.onload = (event) => {
        try {
            const data = JSON.parse(event.target.result);
            if(confirm(`${data.length}件のデータを取り込みますか？`)) saveToStorage(data);
        } catch(e) { alert("読み込みエラー: 正しい形式のファイルではありません。"); }
    };
    reader.readAsText(e.target.files[0]);
}

function restoreLastBackup() {
    const b = localStorage.getItem("med_bak1");
    if (b && confirm("直前の保存状態に戻しますか？")) {
        patients = JSON.parse(b);
        localStorage.setItem("med_consent_db", b);
        renderAll();
    } else { alert("復元できるデータがありません。"); }
}
</script>

</body>
</html>
