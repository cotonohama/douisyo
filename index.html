<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>同意書管理システム (Stable Master)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#4CAF50">
    <style>
        body{font-family:sans-serif;background:#f5f5f5;padding:10px;max-width:1000px;margin:auto;}
        h1{text-align:center;color:#333;margin-bottom:5px;font-size:24px;}
        .version{text-align:center;font-size:11px;color:#888;margin-bottom:15px;}
        .card{background:white;padding:15px;border-radius:8px;margin-bottom:15px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
        input,textarea,select,button{width:100%;padding:12px;margin:5px 0 10px 0;font-size:16px;box-sizing:border-box;border-radius:5px;border:1px solid #ccc;}
        button{background:#4CAF50;color:white;border:none;cursor:pointer;font-weight:bold;}
        button:active{opacity:0.7;}
        
        .btn-sync { background: #06C755; } 
        .btn-json { background: #673ab7; }
        .btn-restore { background: #ff9800; }
        .btn-csv { background: #607d8b; }
        .btn-blue { background: #2196F3; }
        .btn-del { background: #f44336; padding: 5px 10px; width: auto; margin:0;}
        .btn-edit { background: #2196f3; padding: 5px 10px; width: auto; margin:0;}
        .btn-google { background: #fb8c00; padding: 5px 10px; width: auto; margin:0; font-size: 11px;}

        table{width:100%;border-collapse:collapse;margin-top:10px;}
        th,td{border:1px solid #ddd;padding:10px;font-size:14px;text-align:left;}
        th{background:#eee;}
        .expired{background:#ffd6d6;}
        .status-bar { height: 4px; width: 100%; margin-top: 4px; border-radius: 2px; }
        .bg-red { background: red; }
        .bg-orange { background: #ff8800; }
        .bg-yellow { background: #caa400; }

        .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
        .day{border:1px solid #ddd;min-height:75px;padding:3px;font-size:10px;background:white;}
        .day b{font-size:13px;}
        .flex-group{display:flex;gap:10px;flex-wrap: wrap;}
    </style>
</head>
<body>

<h1>同意書管理システム</h1>
<div class="version">Stable Master v3.4</div>

<details class="card" style="background: #e8f5e9;">
    <summary style="font-weight:bold; cursor:pointer; color:#2e7d32;">🔄 同期・バックアップ・復元・設定</summary>
    <div style="margin-top:10px;">
        <button onclick="enableNotification()" class="btn-blue">🔔 通知許可を有効にする</button>
        <button onclick="generateSyncURL()" class="btn-sync">🔗 同期URLを発行 (LINE等)</button>
        <div class="flex-group">
            <button onclick="shareJSON()" class="btn-json" style="flex:1;">📤 JSON共有</button>
            <button onclick="downloadJSON()" class="btn-json" style="flex:1;">💾 JSON保存</button>
            <button onclick="document.getElementById('importFile').click()" class="btn-json" style="flex:1;">📥 JSON読込</button>
        </div>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
        <button onclick="restoreAutoBackup()" class="btn-restore">↩️ 直前の自動バックアップから復元</button>
        <button onclick="backupCSV()" class="btn-csv">📊 Excel用CSV出力</button>
    </div>
</details>

<div class="card">
    <div style="display:flex; gap:20px; flex-wrap:wrap;">
        <div><strong>【今月更新】</strong><div id="thisMonthSummary"></div></div>
        <div style="border-left:1px solid #ddd; padding-left:20px;"><strong>【来月更新】</strong><div id="nextMonthSummary"></div></div>
    </div>
</div>

<div class="card">
    <input id="search" placeholder="名前やメモで検索..." oninput="render()">
    <div class="flex-group">
        <select id="sort" style="flex:1;" onchange="render()"><option value="expiry">期限順</option><option value="name">名前順</option></select>
        <select id="filter" style="flex:1;" onchange="render()"><option value="all">すべて表示</option><option value="this">今月のみ</option><option value="next">来月のみ</option></select>
    </div>
</div>

<div class="card" id="formSection">
    <h3 id="formTitle" style="margin-top:0;">患者登録 / 編集</h3>
    <input type="hidden" id="editIndex" value="">
    <label>患者名</label><input id="name" placeholder="例：斎藤 太郎">
    <div class="flex-group">
        <div style="flex:1;"><label>同意日</label><input type="date" id="consent"></div>
        <div style="flex:1;"><label>初療日（新規のみ有効）</label><input type="date" id="first"></div>
    </div>
    <label style="display:block; margin: 10px 0;"><input type="checkbox" id="deform" style="width:auto; margin-right:8px;">変形徒手矯正（1ヶ月更新）</label>
    <label>通知準備（何日前に通知するか）</label><input type="number" id="notice" value="7">
    <label>メモ</label><textarea id="memo" placeholder="備考など"></textarea>
    <button onclick="save()" style="font-size:1.2em; padding:15px; background:#2e7d32;">保存（一覧に反映）</button>
</div>

<div class="card">
    <h3>患者一覧</h3>
    <div style="overflow-x:auto;"><table><thead><tr><th>名前</th><th>期限</th><th>残日数</th><th>操作</th></tr></thead><tbody id="list"></tbody></table></div>
</div>

<div class="card">
    <h3>更新カレンダー</h3>
    <h4 id="labelThis">今月</h4><div id="calendarThis" class="calendar-grid"></div>
    <h4 id="labelNext">来月</h4><div id="calendarNext" class="calendar-grid"></div>
</div>

<script>
let patients = JSON.parse(localStorage.getItem("patients") || "[]");
let notifiedInSession = [];

window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const syncData = urlParams.get('data');
    if (syncData) {
        try {
            const decodedData = JSON.parse(decodeURIComponent(escape(atob(syncData))));
            if (confirm(`同期データ（${decodedData.length}件）を取り込みますか？`)) {
                autoBackup();
                patients = decodedData;
                localStorage.setItem("patients", JSON.stringify(patients));
                window.location.href = window.location.pathname;
            }
        } catch (e) { alert("同期失敗"); }
    }
    render();
};

function autoBackup() {
    const current = localStorage.getItem("patients");
    const b1 = localStorage.getItem("patients_backup");
    if (b1) localStorage.setItem("patients_backup_old", b1);
    if (current) localStorage.setItem("patients_backup", current);
}

function restoreAutoBackup() {
    const b = localStorage.getItem("patients_backup");
    if (b && confirm("直前の状態に戻しますか？")) {
        patients = JSON.parse(b);
        localStorage.setItem("patients", b);
        render();
    }
}

const endOfMonth = (d) => new Date(d.getFullYear(), d.getMonth() + 1, 0);
const addMonths = (date, m) => { let d = new Date(date); d.setMonth(d.getMonth() + m); return d; };

function calculateExpiry(consent, first, deform, isEdit) {
    let base = (isEdit || !first) ? new Date(consent) : new Date(first);
    if (deform) {
        let exp = new Date(base);
        exp.setMonth(exp.getMonth() + 1);
        exp.setDate(exp.getDate() - 1);
        return exp;
    } else {
        return (base.getDate() <= 15) ? endOfMonth(addMonths(base, 5)) : endOfMonth(addMonths(base, 6));
    }
}

function save() {
    const name = document.getElementById("name").value;
    const consent = document.getElementById("consent").value;
    if (!name || !consent) { alert("名前と同意日は必須です"); return; }

    autoBackup();
    const idxStr = document.getElementById("editIndex").value;
    const isEdit = (idxStr !== "");
    const first = document.getElementById("first").value || null;
    const deform = document.getElementById("deform").checked;
    const expiry = calculateExpiry(consent, first, deform, isEdit);
    
    const data = {
        id: isEdit ? patients[parseInt(idxStr)].id : Date.now(),
        name: name,
        consent: consent,
        first: first,
        deform: deform,
        notice: Number(document.getElementById("notice").value || 7),
        memo: document.getElementById("memo").value,
        expiry: expiry.toISOString()
    };

    if (isEdit) {
        patients[parseInt(idxStr)] = data;
    } else {
        patients.push(data);
    }

    localStorage.setItem("patients", JSON.stringify(patients));
    clearForm();
    render(); // 一覧を更新
    alert("保存しました");
}

function render() {
    const tbody = document.getElementById("list");
    tbody.innerHTML = "";
    const now = new Date(); now.setHours(0,0,0,0);
    const tY = now.getFullYear(); const tM = now.getMonth();
    const nD = new Date(tY, tM + 1, 1);
    const nY = nD.getFullYear(); const nM = nD.getMonth();

    document.getElementById("labelThis").innerText = `${tY}年 ${tM + 1}月`;
    document.getElementById("labelNext").innerText = `${nY}年 ${nM + 1}月`;

    const summaryThis = document.getElementById("thisMonthSummary");
    const summaryNext = document.getElementById("nextMonthSummary");
    summaryThis.innerHTML = ""; summaryNext.innerHTML = "";

    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;
    
    let list = patients.map((p, originalIndex) => ({...p, originalIndex}))
        .filter(p => (p.name + p.memo).toLowerCase().includes(search));
    
    list.sort((a,b) => {
        if (document.getElementById("sort").value === "name") return a.name.localeCompare(b.name);
        return new Date(a.expiry) - new Date(b.expiry);
    });

    list.forEach((p) => {
        const exp = new Date(p.expiry);
        const eY = exp.getFullYear(); const eM = exp.getMonth();
        if (filter === "this" && (eY !== tY || eM !== tM)) return;
        if (filter === "next" && (eY !== nY || eM !== nM)) return;

        const diff = Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
        let c = diff <= 7 ? "bg-red" : diff <= 14 ? "bg-orange" : diff <= 30 ? "bg-yellow" : "";

        let tr = document.createElement("tr");
        if (diff < 0) tr.classList.add("expired");
        tr.innerHTML = `
            <td><b>${p.name}</b>${p.deform ? '<br><small>(変形)</small>' : ''}<div class="status-bar ${c}"></div></td>
            <td>${exp.toLocaleDateString()}</td>
            <td>${diff < 0 ? "期限切れ" : diff + "日"}</td>
            <td>
                <div class="flex-group" style="gap:5px;">
                    <button onclick="edit(${p.originalIndex})" class="btn-edit">編</button>
                    <button onclick="del(${p.originalIndex})" class="btn-del">消</button>
                    <button onclick="addGoogle(${p.originalIndex})" class="btn-google">Gカレ</button>
                </div>
            </td>`;
        tbody.appendChild(tr);

        if (eY === tY && eM === tM) summaryThis.innerHTML += `<div style="font-size:12px; color:#2196f3;">● ${p.name}(${exp.getDate()}日)</div>`;
        if (eY === nY && eM === nM) summaryNext.innerHTML += `<div style="font-size:12px; color:#2196f3;">● ${p.name}(${exp.getDate()}日)</div>`;
    });

    renderCalendar(tY, tM, "calendarThis");
    renderCalendar(nY, nM, "calendarNext");
    checkNotification();
}

function edit(i) {
    const p = patients[i];
    document.getElementById("editIndex").value = i;
    document.getElementById("name").value = p.name;
    document.getElementById("consent").value = p.consent;
    document.getElementById("first").value = p.first || "";
    document.getElementById("deform").checked = p.deform;
    document.getElementById("notice").value = p.notice;
    document.getElementById("memo").value = p.memo;
    document.getElementById("formTitle").innerText = "編集: " + p.name;
    document.getElementById("formSection").scrollIntoView({behavior: "smooth"});
}

function clearForm() {
    document.getElementById("editIndex").value = "";
    document.getElementById("name").value = "";
    document.getElementById("consent").value = "";
    document.getElementById("first").value = "";
    document.getElementById("deform").checked = false;
    document.getElementById("memo").value = "";
    document.getElementById("formTitle").innerText = "患者登録 / 編集";
}

function del(i) {
    if (confirm(patients[i].name + " 様を削除しますか？")) {
        autoBackup();
        patients.splice(i, 1);
        localStorage.setItem("patients", JSON.stringify(patients));
        render();
    }
}

function renderCalendar(year, month, targetId) {
    const cal = document.getElementById(targetId);
    cal.innerHTML = "";
    ["日","月","火","水","木","金","土"].forEach(h => {
        let d = document.createElement("div"); d.style = "text-align:center; font-weight:bold; background:#eee; padding:5px;"; d.innerText = h; cal.appendChild(d);
    });
    const firstDay = new Date(year, month, 1).getDay();
    for (let i = 0; i < firstDay; i++) { cal.appendChild(document.createElement("div")).className="day"; }
    const lastDate = new Date(year, month + 1, 0).getDate();
    for (let i = 1; i <= lastDate; i++) {
        let cell = document.createElement("div"); cell.className = "day"; cell.innerHTML = `<b>${i}</b><br>`;
        patients.forEach(p => {
            let exp = new Date(p.expiry);
            if (exp.getFullYear() === year && exp.getMonth() === month && exp.getDate() === i) {
                cell.innerHTML += `<span style="color:red; font-size:9px;">
