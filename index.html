<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>同意書管理</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<style>

body{
font-family:sans-serif;
margin:20px;
background:#f5f5f5;
}

h1{
margin-bottom:10px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

input,select,button{
padding:8px;
margin:5px;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:8px;
border-bottom:1px solid #ddd;
}

.expired{background:#ffb3b3}
.red{background:#ffcccc}
.orange{background:#ffe0b3}
.yellow{background:#fff6b3}

</style>
</head>

<body>

<h1 id="title"></h1>

<div id="clinicSetup" class="card" style="display:none">

<h3>施術所登録</h3>

<input id="clinicName" placeholder="施術所名">
<input id="clinicTel" placeholder="電話番号">
<input id="clinicAddress" placeholder="住所">

<br>

<button onclick="saveClinic()">保存</button>

</div>


<div id="mainApp" style="display:none">

<div class="card">

<h3>患者登録</h3>

<input id="name" placeholder="患者名">

<br>

同意日  
<input type="date" id="consent">

<br>

初療日  
<input type="date" id="first">

<br>

<select id="type">
<option value="normal">マッサージ</option>
<option value="deform">変形徒手</option>
</select>

<br>

<button onclick="addPatient()">登録</button>

</div>


<div class="card">

<h3>患者一覧</h3>

<table id="patientTable">

<thead>

<tr>
<th>患者名</th>
<th>期限</th>
<th>残日数</th>
<th></th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>


<div class="card">

<h3>バックアップ</h3>

<button onclick="exportJSON()">JSON保存</button>

<input type="file" onchange="importJSON(event)">

</div>


<div class="card">

<h3>QR同期</h3>

<button onclick="showQR()">QR作成</button>

<div id="qrcode"></div>

<input id="qrImport" placeholder="QRデータ貼り付け">
<button onclick="importQR()">同期</button>

</div>

</div>



<script>

let clinic=null
let patients=[]


function init(){

clinic=JSON.parse(localStorage.getItem("clinic"))

patients=JSON.parse(localStorage.getItem("patients")||"[]")

if(!clinic){

document.getElementById("clinicSetup").style.display="block"

}else{

startApp()

}

}


function startApp(){

document.getElementById("mainApp").style.display="block"

document.getElementById("title").innerText=
clinic.name+" 同意書管理"

render()

}


function saveClinic(){

clinic={
name:clinicName.value,
tel:clinicTel.value,
address:clinicAddress.value
}

localStorage.setItem("clinic",JSON.stringify(clinic))

document.getElementById("clinicSetup").style.display="none"

startApp()

}



function addPatient(){

let p={

name:name.value,

consent:consent.value,

first:first.value,

type:type.value

}

patients.push(p)

savePatients()

render()

}



function savePatients(){

localStorage.setItem("patients",JSON.stringify(patients))

}



function calcExpiry(consent,first,type){

let start=new Date(consent)

if(first){

let f=new Date(first)

let diff=(f-start)/(1000*60*60*24)

if(diff<=30){

start=f

}

}

if(type==="deform"){

let d=new Date(start)

d.setMonth(d.getMonth()+1)

d.setDate(d.getDate()-1)

return d

}

let day=start.getDate()

let m=start.getMonth()

let y=start.getFullYear()

let add=(day<=15)?6:7

return new Date(y,m+add+1,0)

}



function render(){

let tbody=document.querySelector("#patientTable tbody")

tbody.innerHTML=""

patients.forEach((p,i)=>{

let expiry=calcExpiry(p.consent,p.first,p.type)

let today=new Date()

let diff=Math.ceil((expiry-today)/(1000*60*60*24))

let cls=""

if(diff<0)cls="expired"
else if(diff<=7)cls="red"
else if(diff<=14)cls="orange"
else if(diff<=30)cls="yellow"

let tr=document.createElement("tr")

tr.className=cls

tr.innerHTML=`

<td>${p.name}</td>
<td>${expiry.toLocaleDateString()}</td>
<td>${diff}</td>
<td><button onclick="del(${i})">削除</button></td>

`

tbody.appendChild(tr)

})

}



function del(i){

patients.splice(i,1)

savePatients()

render()

}



function exportJSON(){

let data=JSON.stringify({clinic,patients})

let blob=new Blob([data])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="backup.json"

a.click()

}



function importJSON(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

let data=JSON.parse(reader.result)

clinic=data.clinic

patients=data.patients

localStorage.setItem("clinic",JSON.stringify(clinic))
localStorage.setItem("patients",JSON.stringify(patients))

location.reload()

}

reader.readAsText(file)

}



function showQR(){

let data=JSON.stringify({clinic,patients})

let base=btoa(data)

let url=location.origin+location.pathname+"#"+base

let div=document.getElementById("qrcode")

div.innerHTML=""

QRCode.toCanvas(url,function(err,canvas){

div.appendChild(canvas)

})

}



function importQR(){

let txt=document.getElementById("qrImport").value

let base=txt.split("#")[1]

let data=JSON.parse(atob(base))

clinic=data.clinic
patients=data.patients

savePatients()

localStorage.setItem("clinic",JSON.stringify(clinic))

location.reload()

}



init()

</script>

</body>
</html>
