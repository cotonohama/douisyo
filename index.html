<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>同意書管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>
body{font-family:sans-serif;max-width:720px;margin:auto;padding:20px}
h1{text-align:center}
input,textarea{width:100%;padding:10px;margin-top:5px;box-sizing:border-box}
textarea{min-height:60px}
.checkbox{display:flex;gap:10px;margin-top:10px}
button{width:100%;padding:12px;margin-top:10px;background:#4CAF50;color:#fff;border:none;border-radius:6px}
.card{border:1px solid #ddd;padding:12px;margin-top:10px;border-radius:10px}
.green{background:#e8f5e9}
.yellow{background:#fff9c4}
.orange{background:#ffe0b2}
.red{background:#ffcdd2}
.small{font-size:0.9em;color:#444}
</style>
</head>

<body>

<h1>同意書管理</h1>

<h3>患者登録</h3>

<label>患者名</label>
<input type="text" id="name">

<label>同意日</label>
<input type="date" id="consent">

<label>初療日</label>
<input type="date" id="first">

<div class="checkbox">
<input type="checkbox" id="renewal">
<span>再同意</span>
</div>

<div class="checkbox">
<input type="checkbox" id="deform">
<span>変形徒手</span>
</div>

<label>通知日数</label>
<input type="number" id="alertDays" value="30">

<label>更新予定日</label>
<input type="date" id="planDate">

<label>メモ</label>
<textarea id="memo"></textarea>

<button onclick="savePatient()">保存</button>

<h3>患者一覧</h3>
<div id="list"></div>

<script>

let patients = JSON.parse(localStorage.getItem("patients")||"[]")

function endOfMonth(date){
return new Date(date.getFullYear(),date.getMonth()+1,0)
}

function addMonths(date,m){
let d=new Date(date)
d.setMonth(d.getMonth()+m)
return d
}

function calculateExpiry(consent,first,renewal,deform){

let consentDate=new Date(consent)
let firstDate=first?new Date(first):null
let base

if(renewal){
base=consentDate
}else{
if(firstDate){
let diff=(firstDate-consentDate)/(1000*60*60*24)
if(diff>30){base=consentDate}else{base=firstDate}
}else{base=consentDate}
}

let expiry

if(deform){
expiry=new Date(base)
expiry.setMonth(expiry.getMonth()+1)
expiry.setDate(expiry.getDate()-1)
}else{
let day=base.getDate()
if(day<=15){
expiry=endOfMonth(addMonths(base,5))
}else{
expiry=endOfMonth(addMonths(base,6))
}
}

return expiry
}

function daysLeft(date){
let today=new Date()
today.setHours(0,0,0,0)
let diff=(date-today)/(1000*60*60*24)
return Math.floor(diff)
}

function getColor(days){
if(days<0)return "red"
if(days<=30)return "orange"
if(days<=60)return "yellow"
return "green"
}

function savePatient(){

let name=document.getElementById("name").value
let consent=document.getElementById("consent").value
let first=document.getElementById("first").value
let renewal=document.getElementById("renewal").checked
let deform=document.getElementById("deform").checked
let alertDays=parseInt(document.getElementById("alertDays").value)||30
let memo=document.getElementById("memo").value
let planDate=document.getElementById("planDate").value

if(!name||!consent){
alert("患者名と同意日を入力")
return
}

patients.push({name,consent,first,renewal,deform,alertDays,memo,planDate})

localStorage.setItem("patients",JSON.stringify(patients))

render()
}

function deletePatient(i){

patients.splice(i,1)

localStorage.setItem("patients",JSON.stringify(patients))

render()
}

function render(){

let list=document.getElementById("list")

list.innerHTML=""

patients.forEach((p,i)=>{

let expiry=calculateExpiry(p.consent,p.first,p.renewal,p.deform)

let days=daysLeft(expiry)

let color=getColor(days)

let card=document.createElement("div")

card.className="card "+color

card.innerHTML=`
<b>${p.name}</b><br>
期限 ${expiry.toLocaleDateString()}<br>
残り ${days}日<br>
${p.planDate ? "更新予定 "+p.planDate+"<br>" : ""}
${p.memo ? "<div class='small'>メモ: "+p.memo+"</div>" : ""}
<br>
<button onclick="deletePatient(${i})">削除</button>
`

list.appendChild(card)

})

}

render()

</script>

<script>
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js')
}
</script>

</body>
</html>
